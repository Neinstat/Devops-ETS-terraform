[app_proxy]
vm-app-proxy ansible_host=<VM1_PUBLIC_IP>

[app_proxy:vars]
ansible_user=<VM_USER>
ansible_password=<VM_PASSWORD>
ansible_become_password=<VM_PASSWORD>
ansible_host_key_checking=False
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30

[master]
<VM2_PRIVATE_IP>

[master:vars]
ansible_user=<VM_USER>
ansible_password=<VM_PASSWORD>
ansible_become_password=<VM_PASSWORD>
ansible_host_key_checking=False
ansible_ssh_common_args=-o ProxyCommand="sshpass -p '<VM_PASSWORD>' ssh -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 <VM_USER>@<VM1_PUBLIC_IP>" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[slave]
<VM3_PRIVATE_IP>

[slave:vars]
ansible_user=<VM_USER>
ansible_password=<VM_PASSWORD>
ansible_become_password=<VM_PASSWORD>
ansible_host_key_checking=False
ansible_ssh_common_args=-o ProxyCommand="sshpass -p '<VM_PASSWORD>' ssh -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 <VM_USER>@<VM1_PUBLIC_IP>" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
