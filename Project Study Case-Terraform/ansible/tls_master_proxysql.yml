- name: 1. Generate TLS Certificates Locally
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Pastikan direktori certs lokal tersedia
      file:
        path: "{{ playbook_dir }}/certs"
        state: directory
        mode: '0755'

    - name: Generate CA Key & CA Cert
      shell: |
        openssl genrsa -out ca-key.pem 4096
        openssl req -new -x509 -nodes -days 3650 -key ca-key.pem -out ca.pem -subj "/C=ID/ST=Jawa Timur/O=DevOps/CN=DevOps-Kelompok2-CA"
      args:
        chdir: "{{ playbook_dir }}/certs"
        creates: "{{ playbook_dir }}/certs/ca.pem"

    - name: Generate Certs untuk Master DB
      shell: |
        openssl genrsa -out master-key.pem 2048
        openssl req -new -key master-key.pem -out master.csr -subj "/C=ID/ST=Jawa Timur/O=DevOps/CN=vm-master-db"
        openssl x509 -req -in master.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out master-cert.pem -days 3650
      args:
        chdir: "{{ playbook_dir }}/certs"
        creates: "{{ playbook_dir }}/certs/master-cert.pem"

    - name: Generate Certs untuk Slave DB
      shell: |
        openssl genrsa -out slave-key.pem 2048
        openssl req -new -key slave-key.pem -out slave.csr -subj "/C=ID/ST=Jawa Timur/O=DevOps/CN=vm-slave-db"
        openssl x509 -req -in slave.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out slave-cert.pem -days 3650
      args:
        chdir: "{{ playbook_dir }}/certs"
        creates: "{{ playbook_dir }}/certs/slave-cert.pem"

    - name: Generate Certs Frontend untuk ProxySQL (App <-> Proxy)
      shell: |
        openssl genrsa -out proxysql-key.pem 2048
        openssl req -new -key proxysql-key.pem -out proxysql.csr -subj "/C=ID/ST=Jawa Timur/O=DevOps/CN=vm-app-proxy"
        openssl x509 -req -in proxysql.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out proxysql-cert.pem -days 3650
        cp ca.pem proxysql-ca.pem
      args:
        chdir: "{{ playbook_dir }}/certs"
        creates: "{{ playbook_dir }}/certs/proxysql-cert.pem"


- name: 2. Implementasi TLS di Database Master
  hosts: master
  become: yes
  tasks:
    - name: Buat direktori TLS di Master
      file: path=/etc/mysql/tls state=directory owner=mysql group=mysql mode="0750"

    - name: Copy sertifikat TLS ke Master
      copy:
        src: "{{ playbook_dir }}/certs/{{ item.src }}"
        dest: "/etc/mysql/tls/{{ item.dest }}"
        owner: mysql
        group: mysql
        mode: "{{ item.mode }}"
      loop:
        - { src: 'ca.pem', dest: 'ca.pem', mode: '0644' }
        - { src: 'master-cert.pem', dest: 'server-cert.pem', mode: '0644' }
        - { src: 'master-key.pem', dest: 'server-key.pem', mode: '0600' }

    - name: Timpa konfigurasi MariaDB Master
      copy:
        dest: /etc/mysql/mariadb.conf.d/50-server.cnf
        owner: root
        group: root
        mode: '0644'
        content: |
          [mysqld]
          server-id               = 1
          bind-address            = 0.0.0.0
          log_bin                 = /var/log/mysql/mysql-bin.log
          binlog_format           = ROW
          expire_logs_days        = 7
          max_binlog_size         = 100M
          innodb_buffer_pool_size = 512M
          ssl-ca = /etc/mysql/tls/ca.pem
          ssl-cert = /etc/mysql/tls/server-cert.pem
          ssl-key = /etc/mysql/tls/server-key.pem
          tls_version = TLSv1.2,TLSv1.3
          # require_secure_transport = ON  # Off sementara untuk Slave

    - name: Restart MariaDB di Master
      service: name=mariadb state=restarted

- name: 2b. Implementasi TLS di Database Slave
  hosts: slave
  become: yes
  tasks:
    - name: Buat direktori TLS di Slave
      file: path=/etc/mysql/tls state=directory owner=mysql group=mysql mode="0750"

    - name: Copy sertifikat TLS ke Slave
      copy:
        src: "{{ playbook_dir }}/certs/{{ item.src }}"
        dest: "/etc/mysql/tls/{{ item.dest }}"
        owner: mysql
        group: mysql
        mode: "{{ item.mode }}"
      loop:
        - { src: 'ca.pem',        dest: 'ca.pem',        mode: '0644' }
        - { src: 'slave-cert.pem', dest: 'server-cert.pem', mode: '0644' }
        - { src: 'slave-key.pem',  dest: 'server-key.pem',  mode: '0600' }

    - name: Timpa konfigurasi MariaDB Slave
      copy:
        dest: /etc/mysql/mariadb.conf.d/50-server.cnf
        owner: root
        group: root
        mode: '0644'
        content: |
          [mysqld]
          server-id = 2
          bind-address = 0.0.0.0
          relay_log = /var/log/mysql/mysql-relay-bin.log
          log_bin = /var/log/mysql/mysql-bin.log
          binlog_format = ROW
          read_only = ON
          innodb_buffer_pool_size = 512M
          ssl-ca   = /etc/mysql/tls/ca.pem
          ssl-cert = /etc/mysql/tls/server-cert.pem
          ssl-key  = /etc/mysql/tls/server-key.pem
          tls_version = TLSv1.2,TLSv1.3

    - name: Restart MariaDB di Slave
      service: name=mariadb state=restarted


- name: 3. Implementasi TLS di App & ProxySQL (VM1)
  hosts: app_proxy
  become: yes
  tasks:
    - name: Render konfigurasi ProxySQL Custom
      copy:
        dest: /opt/ecommerce/proxysql/proxysql.cnf
        owner: root
        group: root
        mode: '0644'
        content: |
          datadir="/var/lib/proxysql"
          admin_variables=
          {
              admin_credentials="kelompok2admin:{{ lookup('env', 'PROXYSQL_ADMIN_PASSWORD') }}"
              mysql_ifaces="0.0.0.0:6032"
          }
          mysql_variables=
          {
              threads=4
              max_connections=2048
              default_query_delay=0
              default_query_timeout=36000000
              interfaces="0.0.0.0:6033"
              monitor_username="proxysql_monitor"
              monitor_password="{{ lookup('env', 'DB_MONITOR_PASSWORD') }}"
          }
          mysql_servers=
          (
              { address="10.0.1.20", port=3306, hostgroup=0, max_connections=100, use_ssl=1 },
              { address="10.0.1.20", port=3306, hostgroup=1, max_connections=100, weight=1, use_ssl=1 },
              { address="10.0.1.21", port=3306, hostgroup=1, max_connections=100, weight=1000, use_ssl=1 }
              
          )
          mysql_users=
          (
              { username="app_user", password="{{ lookup('env', 'DB_APP_PASSWORD') }}", default_hostgroup=0 }
          )
          mysql_query_rules=
          (
              { rule_id=1, active=1, match_pattern="^SELECT.*FOR UPDATE", destination_hostgroup=0, apply=1 },
              { rule_id=2, active=1, match_pattern="^SELECT", destination_hostgroup=1, apply=1 },
              { rule_id=3, active=1, match_pattern=".*", destination_hostgroup=0, apply=1 }
          )

    - name: Deploy Ulang ProxySQL Configuration
      include_role:
        name: proxysql_runtime

    - name: Copy Frontend Certs ke VM1 Temp
      copy:
        src: "{{ playbook_dir }}/certs/{{ item }}"
        dest: "/tmp/{{ item }}"
      loop:
        - proxysql-ca.pem
        - proxysql-cert.pem
        - proxysql-key.pem

    - name: Inject Frontend Certs ke Container ProxySQL & Restart
      shell: |
        docker cp /tmp/proxysql-ca.pem ecommerce-proxysql:/var/lib/proxysql/proxysql-ca.pem
        docker cp /tmp/proxysql-cert.pem ecommerce-proxysql:/var/lib/proxysql/proxysql-cert.pem
        docker cp /tmp/proxysql-key.pem ecommerce-proxysql:/var/lib/proxysql/proxysql-key.pem
        docker exec ecommerce-proxysql chown proxysql:proxysql /var/lib/proxysql/proxysql-ca.pem /var/lib/proxysql/proxysql-cert.pem /var/lib/proxysql/proxysql-key.pem
        docker restart ecommerce-proxysql
      args:
        executable: /bin/bash

    - name: Upload Source Code App Terbaru ke VM1
      copy:
        src: "{{ playbook_dir }}/../docker/app/"
        dest: "/opt/ecommerce/app-src/"

    - name: Build ulang Docker image App dengan SSL
      command: docker build -t ecommerce-app:latest /opt/ecommerce/app-src/

    - name: Deploy Ulang App Database Integration
      include_role:
        name: app_runtime_integration