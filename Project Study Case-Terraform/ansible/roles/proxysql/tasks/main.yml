---
- name: Validasi secret ProxySQL yang wajib
  assert:
    that:
      - proxysql_admin_password | default('', true) | length > 0
      - proxysql_monitor_password | default('', true) | length > 0
      - proxysql_app_password | default('', true) | length > 0
    fail_msg: "Isi PROXYSQL_ADMIN_PASSWORD, DB_MONITOR_PASSWORD, dan DB_APP_PASSWORD sebelum menjalankan proxysql.yml."

- name: Pastikan direktori konfigurasi ProxySQL ada
  file:
    path: "{{ proxysql_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render konfigurasi ProxySQL
  template:
    src: proxysql.cnf.j2
    dest: "{{ proxysql_config_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Tampilkan kontrak koneksi app untuk integrasi
  debug:
    msg:
      - "Port query ProxySQL adalah {{ proxysql_query_port }} di VM1."
      - "App tidak boleh menggunakan 127.0.0.1 jika berjalan di container yang berbeda."
      - "Kredensial app yang diharapkan: user={{ proxysql_app_username }}, database=ecommerce."
