---
# Gagalkan lebih awal agar playbook tidak membuat ulang app dengan konfigurasi DB yang tidak lengkap.
- name: Validasi password DB app
  assert:
    that:
      - app_runtime_db_password | default('', true) | length > 0
    fail_msg: "Isi DB_APP_PASSWORD sebelum menjalankan app_runtime_integration.yml."

- name: Pastikan Docker CLI tersedia di VM1
  command: docker --version
  changed_when: false

- name: Cek apakah image app ada di VM1
  shell: docker image inspect {{ app_runtime_image_name }} >/dev/null 2>&1
  register: app_runtime_image
  changed_when: false
  failed_when: app_runtime_image.rc != 0

- name: Cek apakah container app sudah ada
  shell: docker ps -a --filter "name=^{{ app_runtime_container_name }}$" --format '{{'{{'}}.Names{{'}}'}}'
  register: app_runtime_container
  changed_when: false

- name: Hapus container app lama sebelum dibuat ulang
  command: docker rm -f {{ app_runtime_container_name }}
  when:
    - app_runtime_container.stdout == app_runtime_container_name

- name: Jalankan container app dengan environment integrasi DB terkelola
  command: >
    docker run -d --name {{ app_runtime_container_name }}
    --restart always
    -p {{ app_runtime_host_port }}:{{ app_runtime_container_port }}
    -e DB_HOST={{ app_runtime_db_host }}
    -e DB_PORT={{ app_runtime_db_port }}
    -e DB_USER={{ app_runtime_db_user }}
    -e DB_PASSWORD={{ app_runtime_db_password }}
    -e DB_NAME={{ app_runtime_db_name }}
    {{ app_runtime_image_name }}

- name: Pastikan container app terkelola sedang berjalan
  shell: docker ps --filter "name=^{{ app_runtime_container_name }}$" --format '{{'{{'}}.Names{{'}}'}} {{'{{'}}.Status{{'}}'}}'
  register: app_runtime_status
  changed_when: false

- name: Tampilkan status container app
  debug:
    var: app_runtime_status.stdout
